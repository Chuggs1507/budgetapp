<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">
    <meta name="theme-color" content="#0d0d12">
    <title>Budget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #08080c;
            --bg-base: #0d0d14;
            --bg-surface: #16161f;
            --bg-elevated: #1e1e2a;
            --bg-hover: #262636;
            --border: #2a2a3a;
            --border-subtle: #1f1f2e;
            --text-primary: #ededf0;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #c9a54e;
            --accent-dim: #a0832e;
            --accent-glow: rgba(201, 165, 78, 0.15);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.12);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96, 165, 250, 0.12);
            --purple: #a78bfa;
            --purple-dim: rgba(167, 139, 250, 0.12);
            --pink: #f472b6;
            --teal: #2dd4bf;
            --orange: #fb923c;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --font-body: 'Outfit', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        input, select, textarea { -webkit-user-select: text; user-select: text; }

        .app { max-width: 720px; margin: 0 auto; padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); padding-bottom: max(80px, env(safe-area-inset-bottom)); }

        /* ─── Password Screen ─── */
        .lock-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-deep);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .lock-screen.hidden { display: none; }
        .lock-card {
            width: 100%; max-width: 360px; text-align: center;
        }
        .lock-icon {
            width: 64px; height: 64px; margin: 0 auto 24px;
            background: var(--accent-glow); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .lock-card h2 {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .lock-card p { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 28px; }
        .lock-input {
            width: 100%; padding: 14px 16px;
            background: var(--bg-surface); border: 1.5px solid var(--border);
            border-radius: var(--radius); color: var(--text-primary);
            font-family: var(--font-body); font-size: 1rem;
            text-align: center; letter-spacing: 0.15em;
            margin-bottom: 12px; outline: none;
            transition: border-color 0.2s;
        }
        .lock-input:focus { border-color: var(--accent); }
        .lock-input::placeholder { letter-spacing: 0; color: var(--text-muted); }
        .lock-error { color: var(--red); font-size: 0.8125rem; min-height: 20px; margin-bottom: 8px; }
        .lock-btn {
            width: 100%; padding: 14px;
            background: var(--accent); color: var(--bg-deep);
            border: none; border-radius: var(--radius);
            font-family: var(--font-body); font-size: 0.9375rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .lock-btn:hover { opacity: 0.9; }

        /* ─── Header / Month Nav ─── */
        .header {
            padding: 20px 0 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left h1 {
            font-size: 1.625rem; font-weight: 800; letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-right { display: flex; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }

        .month-nav {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 6px; margin-bottom: 20px;
        }
        .month-nav button {
            background: none; border: none; color: var(--text-secondary);
            width: 40px; height: 36px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .month-nav button:hover { background: var(--bg-elevated); color: var(--text-primary); }
        .month-label { font-weight: 600; font-size: 0.9375rem; letter-spacing: -0.01em; }
        .month-badge {
            font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; padding: 2px 8px; border-radius: 6px;
            margin-left: 8px;
        }
        .month-badge.current { background: var(--green-dim); color: var(--green); }
        .month-badge.past { background: var(--bg-elevated); color: var(--text-muted); }
        .month-badge.future { background: var(--blue-dim); color: var(--blue); }

        /* ─── Summary Cards ─── */
        .summary-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin-bottom: 20px;
        }
        .sum-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
        }
        .sum-card .label {
            font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px;
        }
        .sum-card .value {
            font-family: var(--font-mono); font-size: 1.375rem; font-weight: 700;
            letter-spacing: -0.02em;
        }
        .sum-card .sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .sum-card.income .value { color: var(--green); }
        .sum-card.allocated .value { color: var(--accent); }
        .sum-card.unallocated .value { color: var(--text-secondary); }
        .sum-card.unallocated .value.negative { color: var(--red); }
        .sum-card.savings .value { color: var(--purple); }

        /* ─── Donut Chart Section ─── */
        .chart-section {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 20px;
            margin-bottom: 20px; text-align: center;
        }
        .chart-container { position: relative; width: 200px; height: 200px; margin: 0 auto 16px; }
        .chart-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center;
        }
        .chart-center .big { font-family: var(--font-mono); font-size: 1.25rem; font-weight: 700; }
        .chart-center .small { font-size: 0.6875rem; color: var(--text-muted); }
        .chart-legend {
            display: flex; flex-wrap: wrap; gap: 8px 16px; justify-content: center;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8125rem; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .legend-amount { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); }

        /* ─── Collapsible Section ─── */
        .panel {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); margin-bottom: 12px;
            overflow: hidden;
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; cursor: pointer; transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .panel-header:hover { background: var(--bg-elevated); }
        .panel-header h2 {
            font-size: 0.9375rem; font-weight: 700; letter-spacing: -0.01em;
            display: flex; align-items: center; gap: 10px;
        }
        .panel-count {
            font-size: 0.6875rem; font-weight: 600;
            background: var(--bg-elevated); color: var(--text-secondary);
            padding: 2px 8px; border-radius: 10px;
        }
        .panel-right { display: flex; align-items: center; gap: 12px; }
        .panel-total {
            font-family: var(--font-mono); font-size: 0.875rem; font-weight: 600;
            color: var(--accent);
        }
        .panel-chevron {
            color: var(--text-muted); transition: transform 0.25s ease;
            font-size: 0.875rem;
        }
        .panel.collapsed .panel-chevron { transform: rotate(-90deg); }
        .panel-body { padding: 0 20px 16px; }
        .panel.collapsed .panel-body { display: none; }

        /* ─── Form Row ─── */
        .add-row {
            display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .add-row input, .add-row select {
            flex: 1; min-width: 0; padding: 10px 12px;
            background: var(--bg-elevated); border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-family: var(--font-body); font-size: 0.875rem; outline: none;
            transition: border-color 0.2s;
        }
        .add-row input:focus, .add-row select:focus { border-color: var(--accent); }
        .add-row input::placeholder { color: var(--text-muted); }
        .add-row select { -webkit-appearance: none; appearance: none; cursor: pointer; }
        .add-row .input-amount { flex: 0 0 100px; font-family: var(--font-mono); }
        .add-row .input-cat { flex: 0 0 130px; }
        .btn-add {
            padding: 10px 16px; background: var(--accent); color: var(--bg-deep);
            border: none; border-radius: var(--radius-sm);
            font-family: var(--font-body); font-size: 0.8125rem; font-weight: 700;
            cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.85; }

        /* ─── List Items ─── */
        .item-list { display: flex; flex-direction: column; gap: 4px; }
        .list-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: var(--bg-elevated);
            border-radius: var(--radius-sm); transition: background 0.15s;
        }
        .list-item:hover { background: var(--bg-hover); }
        .list-item .name { flex: 1; font-size: 0.875rem; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .list-item .cat-tag {
            font-size: 0.6875rem; font-weight: 600; padding: 2px 8px;
            border-radius: 6px; background: var(--accent-glow); color: var(--accent);
            white-space: nowrap;
        }
        .list-item .fp-tag {
            font-size: 0.6rem; font-weight: 700; padding: 2px 6px;
            border-radius: 4px; background: var(--purple-dim); color: var(--purple);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .list-item .amount-edit {
            width: 90px; padding: 6px 8px; text-align: right;
            background: transparent; border: 1.5px solid transparent;
            border-radius: 6px; color: var(--text-primary);
            font-family: var(--font-mono); font-size: 0.8125rem; font-weight: 600;
            outline: none; transition: all 0.2s;
        }
        .list-item .amount-edit:focus { border-color: var(--accent); background: var(--bg-surface); }
        .btn-del {
            width: 28px; height: 28px; border-radius: 6px;
            background: transparent; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 0.875rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .btn-del:hover { background: var(--red-dim); color: var(--red); }

        /* ─── Checkbox / Toggle ─── */
        .fp-check {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px; border-radius: 6px;
            background: var(--bg-elevated); border: 1.5px solid var(--border);
            cursor: pointer; font-size: 0.75rem; font-weight: 600;
            color: var(--text-muted); transition: all 0.2s; white-space: nowrap;
        }
        .fp-check.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
        .fp-check input { display: none; }

        .dd-check {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px; border-radius: 6px;
            background: var(--bg-elevated); border: 1.5px solid var(--border);
            cursor: pointer; font-size: 0.75rem; font-weight: 600;
            color: var(--text-muted); transition: all 0.2s; white-space: nowrap;
        }
        .dd-check.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
        .dd-check input { display: none; }

        .list-item .dd-tag {
            font-size: 0.6rem; font-weight: 700; padding: 2px 6px;
            border-radius: 4px; background: var(--green-dim); color: var(--green);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .list-item .manual-tag {
            font-size: 0.6rem; font-weight: 700; padding: 2px 6px;
            border-radius: 4px; background: var(--bg-surface); color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        /* Category Groups in outgoings */
        .cat-group { margin-bottom: 12px; }
        .cat-group-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; margin-bottom: 4px;
            border-left: 3px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            background: var(--bg-base);
        }
        .cat-group-name { font-size: 0.8125rem; font-weight: 700; color: var(--accent); }
        .cat-group-total { font-family: var(--font-mono); font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); }
        .cat-group-items { display: flex; flex-direction: column; gap: 3px; }

        /* Account Summary */
        .acct-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; background: var(--bg-elevated);
            border-radius: var(--radius-sm); margin-bottom: 6px;
        }
        .acct-left { flex: 1; }
        .acct-name { font-size: 0.9375rem; font-weight: 600; margin-bottom: 2px; }
        .acct-breakdown { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 12px; }
        .acct-breakdown .dd-label { color: var(--green); }
        .acct-breakdown .manual-label { color: var(--text-secondary); }
        .acct-total { font-family: var(--font-mono); font-size: 1.125rem; font-weight: 700; color: var(--accent); }

        .option-toggles { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

        /* ─── Savings Accounts ─── */
        .sav-card {
            padding: 16px; background: var(--bg-elevated);
            border-radius: var(--radius-sm); margin-bottom: 8px;
            border-left: 3px solid var(--purple);
        }
        .sav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .sav-name { font-size: 0.9375rem; font-weight: 700; }
        .sav-actions { display: flex; gap: 4px; }
        .sav-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            margin-bottom: 12px;
        }
        .sav-stat {
            background: var(--bg-surface); padding: 10px;
            border-radius: var(--radius-sm);
        }
        .sav-stat-label {
            font-size: 0.625rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 3px;
        }
        .sav-stat-value {
            font-family: var(--font-mono); font-size: 0.9375rem; font-weight: 700;
        }
        .sav-stat-value.balance { color: var(--text-primary); }
        .sav-stat-value.monthly { color: var(--blue); }
        .sav-stat-value.rate { color: var(--green); }
        .sav-stat-value.term { color: var(--orange); }
        .sav-projection {
            background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(244,114,182,0.08));
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: var(--radius-sm); padding: 12px;
        }
        .sav-proj-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 3px 0;
        }
        .sav-proj-label { font-size: 0.75rem; color: var(--text-secondary); }
        .sav-proj-value { font-family: var(--font-mono); font-size: 0.8125rem; font-weight: 600; }
        .sav-proj-value.total { color: var(--purple); font-size: 1.125rem; font-weight: 800; }
        .sav-proj-value.interest { color: var(--green); }
        .sav-proj-value.contributions { color: var(--blue); }
        .sav-edit-row {
            display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap;
        }
        .sav-edit-input {
            width: 80px; padding: 6px 8px; text-align: right;
            background: var(--bg-surface); border: 1.5px solid var(--border);
            border-radius: 6px; color: var(--text-primary);
            font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600;
            outline: none; transition: border-color 0.2s;
        }
        .sav-edit-input:focus { border-color: var(--accent); }
        .sav-edit-label { font-size: 0.6875rem; color: var(--text-muted); }

        /* ─── Category Management ─── */
        .cat-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 12px; background: var(--bg-elevated);
            border-radius: var(--radius-sm); font-size: 0.8125rem; font-weight: 500;
            margin: 0 6px 6px 0;
        }
        .cat-chip .del {
            width: 18px; height: 18px; border-radius: 4px;
            background: transparent; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center;
        }
        .cat-chip .del:hover { background: var(--red-dim); color: var(--red); }

        /* ─── Settings Modal ─── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 9998;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: flex; align-items: flex-end; justify-content: center;
            padding: 0;
        }
        .modal-overlay.hidden { display: none; }
        .modal-content {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            width: 100%; max-width: 500px; max-height: 85vh;
            overflow-y: auto; padding: 24px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }
        .modal-content h2 {
            font-size: 1.125rem; font-weight: 700; margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        .modal-content h3 {
            font-size: 0.8125rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted); margin: 20px 0 12px;
        }
        .modal-input {
            width: 100%; padding: 12px; background: var(--bg-elevated);
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-family: var(--font-body);
            font-size: 0.875rem; outline: none; margin-bottom: 8px;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-btn {
            width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm);
            font-family: var(--font-body); font-size: 0.875rem; font-weight: 600;
            cursor: pointer; margin-bottom: 8px; transition: opacity 0.2s;
        }
        .modal-btn:hover { opacity: 0.85; }
        .modal-btn.primary { background: var(--accent); color: var(--bg-deep); }
        .modal-btn.danger { background: var(--red-dim); color: var(--red); }
        .modal-btn.secondary { background: var(--bg-elevated); color: var(--text-secondary); }

        /* ─── Responsive ─── */
        @media (max-width: 480px) {
            .add-row { flex-direction: column; }
            .add-row .input-amount, .add-row .input-cat { flex: 1; }
            .option-toggles { flex-direction: row; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .sum-card { padding: 12px; }
            .sum-card .value { font-size: 1.125rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .panel { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
    <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h2 id="lockTitle">Set Password</h2>
        <p id="lockSubtitle">Create a password to protect your budget</p>
        <input type="password" class="lock-input" id="lockPass" placeholder="Password" autocomplete="off">
        <input type="password" class="lock-input" id="lockConfirm" placeholder="Confirm password" autocomplete="off">
        <div class="lock-error" id="lockError"></div>
        <button class="lock-btn" id="lockBtn" onclick="submitPassword()">Set Password</button>
    </div>
</div>

<!-- Main App -->
<div class="app" id="mainApp" style="display:none;">
    <div class="header">
        <div class="header-left">
            <h1>Budget</h1>
            <div style="font-size:0.625rem;color:var(--text-muted);margin-top:2px;" id="versionTag"></div>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
        </div>
    </div>

    <div class="month-nav">

<script>
// ════════════════════════════════════════════════
//  SAFE STORAGE WRAPPER
// ════════════════════════════════════════════════
const store = {
    get(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set(k,v) { try { localStorage.setItem(k,v); } catch(e) {} },
    del(k) { try { localStorage.removeItem(k); } catch(e) {} }
};

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const HASH_KEY = 'ba3_passHash';
const DATA_KEY = 'ba3_data';
const APP_VERSION = 'v4';
let data = {};
let curMonth = getCurMonthKey();
let collapsed = JSON.parse(store.get('ba3_collapsed') || '{}');
let _nextId = Date.now();
function uid() { return ++_nextId; }

// Category colors for chart
const CAT_COLORS = ['#c9a54e','#60a5fa','#f472b6','#34d399','#a78bfa','#fb923c','#2dd4bf','#f87171','#818cf8','#fbbf24'];

function getCurMonthKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function fmtMonth(k) {
    const [y,m] = k.split('-');
    return new Date(y, m-1).toLocaleDateString('en-GB', { month:'long', year:'numeric' });
}

function fmtMonthShort(k) {
    const [y,m] = k.split('-');
    return new Date(y, m-1).toLocaleDateString('en-GB', { month:'short', year:'2-digit' });
}

function fmtP(v) { return '£' + Number(v||0).toFixed(2); }
function fmtP0(v) { const n = Number(v||0); return '£' + (n % 1 === 0 ? n.toLocaleString() : n.toFixed(2)); }

// ════════════════════════════════════════════════
//  PASSWORD
// ════════════════════════════════════════════════
function hashPw(pw) {
    // Simple hash that works without crypto.subtle (no HTTPS needed)
    const str = pw + 'ba2-salt-2026';
    let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
    for (let i = 0; i < str.length; i++) {
        const ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return (4294967296 * (2097151 & h2) + (h1 >>> 0)).toString(36) + (4294967296 * (2097151 & h1) + (h2 >>> 0)).toString(36);
}

function hasPass() { return !!store.get(HASH_KEY); }

function submitPassword() {
    const pw = document.getElementById('lockPass').value;
    const err = document.getElementById('lockError');
    if (!pw) { err.textContent = 'Enter a password'; return; }

    if (!hasPass()) {
        const c = document.getElementById('lockConfirm').value;
        if (pw.length < 4) { err.textContent = 'Minimum 4 characters'; return; }
        if (pw !== c) { err.textContent = 'Passwords don\'t match'; return; }
        store.set(HASH_KEY, hashPw(pw));
        unlock();
    } else {
        if (hashPw(pw) === store.get(HASH_KEY)) unlock();
        else { err.textContent = 'Wrong password'; document.getElementById('lockPass').value = ''; }
    }
}

function unlock() {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('mainApp').style.display = 'block';
    load(); render();
}

function initLock() {
    const isSet = hasPass();
    document.getElementById('lockTitle').textContent = isSet ? 'Welcome Back' : 'Set Password';
    document.getElementById('lockSubtitle').textContent = isSet ? 'Enter your password to unlock' : 'Create a password to protect your data';
    document.getElementById('lockConfirm').style.display = isSet ? 'none' : 'block';
    document.getElementById('lockBtn').textContent = isSet ? 'Unlock' : 'Set Password';
}

document.getElementById('lockPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') { hasPass() ? submitPassword() : document.getElementById('lockConfirm').focus(); }
});
document.getElementById('lockConfirm').addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });

// ════════════════════════════════════════════════
//  DATA HELPERS
// ════════════════════════════════════════════════
function load() {
    const raw = store.get(DATA_KEY);
    if (raw) data = JSON.parse(raw);
    const sm = store.get('ba3_curMonth');
    if (sm) curMonth = sm;
}

function save() {
    store.set(DATA_KEY, JSON.stringify(data));
    store.set('ba3_curMonth', curMonth);
    store.set('ba3_collapsed', JSON.stringify(collapsed));
}

function md() {
    if (!data[curMonth]) {
        data[curMonth] = {
            income: [], outgoings: [], categories: ['Bills','Food','Savings','Entertainment','Transport'], savings: []
        };
    }
    // Ensure savings array exists (for older data)
    if (!data[curMonth].savings) data[curMonth].savings = [];
    return data[curMonth];
}

// ════════════════════════════════════════════════
//  MONTH NAVIGATION
// ════════════════════════════════════════════════
function prevMonth() {
    const [y,m] = curMonth.split('-').map(Number);
    const d = new Date(y, m-2);
    curMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    save(); render();
}

function nextMonth() {
    const [y,m] = curMonth.split('-').map(Number);
    const d = new Date(y, m);
    const nk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const cur = md();

    if (!data[nk]) {
        // Brand new month: copy everything as independent starting point
        data[nk] = {
            income: cur.income.map(i => ({...i, id: uid()})),
            outgoings: cur.outgoings.map(o => ({...o, id: uid()})),
            categories: [...cur.categories],
            savings: (cur.savings || []).map(s => ({...s, id: uid()}))
        };
    } else {
        // Month exists — merge any NEW items from current month
        const target = data[nk];

        // Merge income: match by source name
        const existingIncNames = new Set(target.income.map(i => i.source.toLowerCase()));
        cur.income.forEach(i => {
            if (!existingIncNames.has(i.source.toLowerCase())) {
                target.income.push({...i, id: uid()});
            }
        });

        // Merge outgoings: match by name + category
        const existingOutKeys = new Set(target.outgoings.map(o => (o.name + '||' + o.category).toLowerCase()));
        cur.outgoings.forEach(o => {
            if (!existingOutKeys.has((o.name + '||' + o.category).toLowerCase())) {
                target.outgoings.push({...o, id: uid()});
            }
        });

        // Merge categories
        cur.categories.forEach(c => {
            if (!target.categories.includes(c)) target.categories.push(c);
        });

        // Merge savings: match by name
        const existingSavNames = new Set((target.savings||[]).map(s => s.name.toLowerCase()));
        (cur.savings||[]).forEach(s => {
            if (!existingSavNames.has(s.name.toLowerCase())) {
                if (!target.savings) target.savings = [];
                target.savings.push({...s, id: uid()});
            }
        });
    }

    curMonth = nk;
    save(); render();
}

// ════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════
function addIncome() {
    const src = document.getElementById('incSrc').value.trim();
    const amt = parseFloat(document.getElementById('incAmt').value);
    if (!src || !amt || amt <= 0) return;
    md().income.push({ id: uid(), source: src, amount: amt });
    document.getElementById('incSrc').value = '';
    document.getElementById('incAmt').value = '';
    save(); render();
}

function delIncome(id) { md().income = md().income.filter(i => i.id !== id); save(); render(); }

function updIncome(id, val) {
    const it = md().income.find(i => i.id === id);
    if (it) { it.amount = Math.max(0, parseFloat(val)||0); save(); render(); }
}

function addOutgoing() {
    const name = document.getElementById('outName').value.trim();
    const cat = document.getElementById('outCat').value;
    const amt = parseFloat(document.getElementById('outAmt').value);
    const fp = document.getElementById('outFP').checked;
    const dd = document.getElementById('outDD').checked;
    if (!name || !cat || !amt || amt <= 0) return;
    md().outgoings.push({ id: uid(), name, category: cat, amount: amt, futurePlanning: fp, dd: dd });
    document.getElementById('outName').value = '';
    document.getElementById('outCat').value = '';
    document.getElementById('outAmt').value = '';
    document.getElementById('outFP').checked = false;
    document.getElementById('outDD').checked = false;
    updateToggleStyle('outFPCheck', false);
    updateToggleStyle('outDDCheck', false);
    save(); render();
}

function delOutgoing(id) { md().outgoings = md().outgoings.filter(o => o.id !== id); save(); render(); }

function updOutgoing(id, val) {
    const it = md().outgoings.find(o => o.id === id);
    if (it) { it.amount = Math.max(0, parseFloat(val)||0); save(); render(); }
}

function togFP(id) {
    const it = md().outgoings.find(o => o.id === id);
    if (it) { it.futurePlanning = !it.futurePlanning; save(); render(); }
}

function togDD(id) {
    const it = md().outgoings.find(o => o.id === id);
    if (it) { it.dd = !it.dd; save(); render(); }
}

function addCategory() {
    const name = document.getElementById('newCatName').value.trim();
    if (!name) return;
    const cats = md().categories;
    if (cats.find(c => c.toLowerCase() === name.toLowerCase())) return;
    cats.push(name);
    document.getElementById('newCatName').value = '';
    save(); render();
}

function delCategory(name) {
    if (md().outgoings.some(o => o.category === name)) { alert('Remove outgoings from this category first'); return; }
    md().categories = md().categories.filter(c => c !== name);
    save(); render();
}

function addSavings() {
    const name = document.getElementById('savName').value.trim();
    const balance = parseFloat(document.getElementById('savBalance').value) || 0;
    const monthly = parseFloat(document.getElementById('savMonthly').value) || 0;
    const rate = parseFloat(document.getElementById('savRate').value) || 0;
    const term = parseInt(document.getElementById('savTerm').value) || 1;
    if (!name) return;
    md().savings.push({ id: uid(), name, balance, monthly, rate, term });
    document.getElementById('savName').value = '';
    document.getElementById('savBalance').value = '';
    document.getElementById('savMonthly').value = '';
    document.getElementById('savRate').value = '';
    document.getElementById('savTerm').value = '';
    save(); render();
}

function delSavings(id) { md().savings = md().savings.filter(s => s.id !== id); save(); render(); }

function updSavings(id, field, val) {
    const s = md().savings.find(s => s.id === id);
    if (s) {
        s[field] = field === 'term' ? (parseInt(val) || 1) : (parseFloat(val) || 0);
        save(); render();
    }
}

// Compound interest: FV = P(1+r/n)^(nt) + PMT × [((1+r/n)^(nt) - 1) / (r/n)]
function calcCompound(balance, monthly, annualRate, years) {
    const r = annualRate / 100;
    const n = 12; // monthly compounding
    const t = years;
    const totalMonths = n * t;

    if (r === 0) {
        // No interest — just sum contributions
        const futureVal = balance + (monthly * totalMonths);
        const totalContributions = monthly * totalMonths;
        return { futureValue: futureVal, totalContributions, interestEarned: 0 };
    }

    const rn = r / n;
    // Future value of lump sum
    const fvLump = balance * Math.pow(1 + rn, totalMonths);
    // Future value of annuity (monthly contributions)
    const fvAnnuity = monthly * ((Math.pow(1 + rn, totalMonths) - 1) / rn);
    const futureValue = fvLump + fvAnnuity;
    const totalContributions = monthly * totalMonths;
    const interestEarned = futureValue - balance - totalContributions;

    return { futureValue, totalContributions, interestEarned };
}

// ════════════════════════════════════════════════
//  PANEL TOGGLE
// ════════════════════════════════════════════════
function togglePanel(id) {
    const el = document.getElementById(id);
    el.classList.toggle('collapsed');
    collapsed[id] = el.classList.contains('collapsed');
    save();
}

function updateToggleStyle(id, active) {
    const el = document.getElementById(id);
    if (active) el.classList.add('active'); else el.classList.remove('active');
}

// Toggle style listeners
['outFPCheck','outDDCheck'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
        const inp = el.querySelector('input');
        inp.addEventListener('change', () => updateToggleStyle(id, inp.checked));
    }
});

// ════════════════════════════════════════════════
//  DONUT CHART
// ════════════════════════════════════════════════
function renderDonut(catTotals, total) {
    const svg = document.getElementById('donutChart');
    const legend = document.getElementById('chartLegend');
    svg.innerHTML = '';
    legend.innerHTML = '';

    document.getElementById('chartTotal').textContent = fmtP0(total);

    const entries = Object.entries(catTotals).filter(([,v]) => v > 0);
    if (entries.length === 0) {
        // Empty state ring
        svg.innerHTML = `<circle cx="100" cy="100" r="80" fill="none" stroke="var(--bg-elevated)" stroke-width="24"/>`;
        return;
    }

    const cx = 100, cy = 100, r = 80;
    const circ = 2 * Math.PI * r;
    let offset = 0;

    entries.forEach(([cat, val], i) => {
        const pct = val / total;
        const dash = pct * circ;
        const gap = circ - dash;
        const color = CAT_COLORS[md().categories.indexOf(cat) % CAT_COLORS.length];

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', cx);
        circle.setAttribute('cy', cy);
        circle.setAttribute('r', r);
        circle.setAttribute('fill', 'none');
        circle.setAttribute('stroke', color);
        circle.setAttribute('stroke-width', '24');
        circle.setAttribute('stroke-dasharray', `${dash} ${gap}`);
        circle.setAttribute('stroke-dashoffset', -offset);
        circle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
        circle.style.transition = 'stroke-dasharray 0.4s ease, stroke-dashoffset 0.4s ease';
        svg.appendChild(circle);

        offset += dash;

        legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${cat} <span class="legend-amount">${fmtP0(val)}</span></div>`;
    });
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function render() {
    const m = md();
    document.getElementById('versionTag').textContent = APP_VERSION;

    // Month nav
    document.getElementById('monthLabel').textContent = fmtMonth(curMonth);
    const badge = document.getElementById('monthBadge');
    const now = getCurMonthKey();
    if (curMonth === now) { badge.textContent = 'Now'; badge.className = 'month-badge current'; }
    else if (curMonth < now) { badge.textContent = 'Past'; badge.className = 'month-badge past'; }
    else { badge.textContent = 'Future'; badge.className = 'month-badge future'; }

    // Totals
    const totalInc = m.income.reduce((s,i) => s + i.amount, 0);
    const catTotals = {};
    m.categories.forEach(c => { catTotals[c] = m.outgoings.filter(o => o.category === c).reduce((s,o) => s + o.amount, 0); });
    const totalOut = m.outgoings.reduce((s,o) => s + o.amount, 0);
    const unalloc = totalInc - totalOut;
    const fpTotal = m.outgoings.filter(o => o.futurePlanning).reduce((s,o) => s + o.amount, 0);
    const fpPct = totalInc > 0 ? (fpTotal / totalInc * 100).toFixed(1) : '0';

    document.getElementById('sumIncome').textContent = fmtP0(totalInc);
    document.getElementById('sumAllocated').textContent = fmtP0(totalOut);
    const unEl = document.getElementById('sumUnallocated');
    unEl.textContent = fmtP0(unalloc);
    unEl.className = 'value' + (unalloc < 0 ? ' negative' : '');
    document.getElementById('sumFP').textContent = fmtP0(fpTotal);
    document.getElementById('sumFPpct').textContent = fpPct + '% of income';

    // Donut
    renderDonut(catTotals, totalOut);

    // Category dropdown
    const sel = document.getElementById('outCat');
    sel.innerHTML = '<option value="">Category…</option>' + m.categories.map(c => `<option value="${c}">${c}</option>`).join('');

    // Panel counts & totals
    document.getElementById('incomeCount').textContent = m.income.length;
    document.getElementById('incomeTotal').textContent = fmtP0(totalInc);
    document.getElementById('outCount').textContent = m.outgoings.length;
    document.getElementById('outTotal').textContent = fmtP0(totalOut);
    document.getElementById('savingsCount').textContent = (m.savings||[]).length;

    // Income list
    document.getElementById('incomeList').innerHTML = m.income.map(i => `
        <div class="list-item">
            <div class="name">${esc(i.source)}</div>
            <input type="number" class="amount-edit" value="${i.amount.toFixed(2)}" step="0.01" min="0"
                onchange="updIncome(${i.id}, this.value)" onfocus="this.select()">
            <button class="btn-del" onclick="delIncome(${i.id})" title="Delete">✕</button>
        </div>
    `).join('');

    // Outgoings list — grouped by category
    const grouped = {};
    m.categories.forEach(c => { grouped[c] = m.outgoings.filter(o => o.category === c); });
    // Include any uncategorised
    const uncategorised = m.outgoings.filter(o => !m.categories.includes(o.category));
    if (uncategorised.length) grouped['Other'] = uncategorised;

    let outHTML = '';
    Object.entries(grouped).forEach(([cat, items]) => {
        if (items.length === 0) return;
        const catTotal = items.reduce((s,o) => s + o.amount, 0);
        const ci = m.categories.indexOf(cat);
        const color = ci >= 0 ? CAT_COLORS[ci % CAT_COLORS.length] : 'var(--text-muted)';
        outHTML += `<div class="cat-group">
            <div class="cat-group-header" style="border-left-color:${color}">
                <span class="cat-group-name" style="color:${color}">${esc(cat)}</span>
                <span class="cat-group-total">${fmtP0(catTotal)}</span>
            </div>
            <div class="cat-group-items">`;
        items.forEach(o => {
            outHTML += `<div class="list-item">
                <div class="name">${esc(o.name)}</div>
                ${o.dd ? '<span class="dd-tag">DD</span>' : '<span class="manual-tag">Manual</span>'}
                ${o.futurePlanning ? '<span class="fp-tag">FP</span>' : ''}
                <input type="number" class="amount-edit" value="${o.amount.toFixed(2)}" step="0.01" min="0"
                    onchange="updOutgoing(${o.id}, this.value)" onfocus="this.select()">
                <button class="btn-del" onclick="togDD(${o.id})" title="Toggle DD/Manual" style="color:${o.dd?'var(--green)':'var(--text-muted)'}">⇄</button>
                <button class="btn-del" onclick="togFP(${o.id})" title="Toggle FP" style="color:${o.futurePlanning?'var(--purple)':'var(--text-muted)'}">◈</button>
                <button class="btn-del" onclick="delOutgoing(${o.id})" title="Delete">✕</button>
            </div>`;
        });
        outHTML += `</div></div>`;
    });
    document.getElementById('outList').innerHTML = outHTML;

    // Account Summary — totals per category with DD/manual breakdown
    let acctHTML = '';
    m.categories.forEach((cat, ci) => {
        const items = m.outgoings.filter(o => o.category === cat);
        if (items.length === 0) return;
        const total = items.reduce((s,o) => s + o.amount, 0);
        const ddTotal = items.filter(o => o.dd).reduce((s,o) => s + o.amount, 0);
        const manualTotal = items.filter(o => !o.dd).reduce((s,o) => s + o.amount, 0);
        const color = CAT_COLORS[ci % CAT_COLORS.length];
        acctHTML += `<div class="acct-row">
            <div class="acct-left">
                <div class="acct-name" style="color:${color}">${esc(cat)}</div>
                <div class="acct-breakdown">
                    ${ddTotal > 0 ? `<span><span class="dd-label">DD:</span> ${fmtP0(ddTotal)}</span>` : ''}
                    ${manualTotal > 0 ? `<span><span class="manual-label">Manual:</span> ${fmtP0(manualTotal)}</span>` : ''}
                </div>
            </div>
            <div class="acct-total">${fmtP0(total)}</div>
        </div>`;
    });
    document.getElementById('accountSummary').innerHTML = acctHTML || '<div style="color:var(--text-muted);font-size:0.875rem;padding:8px;">No outgoings yet</div>';

    // Savings Accounts
    document.getElementById('savingsList').innerHTML = (m.savings||[]).map(s => {
        const proj = calcCompound(s.balance, s.monthly, s.rate, s.term);
        return `
            <div class="sav-card">
                <div class="sav-header">
                    <div class="sav-name">${esc(s.name)}</div>
                    <div class="sav-actions">
                        <button class="btn-del" onclick="delSavings(${s.id})" title="Delete">✕</button>
                    </div>
                </div>
                <div class="sav-grid">
                    <div class="sav-stat">
                        <div class="sav-stat-label">Current Balance</div>
                        <div class="sav-stat-value balance">${fmtP0(s.balance)}</div>
                    </div>
                    <div class="sav-stat">
                        <div class="sav-stat-label">Monthly Contribution</div>
                        <div class="sav-stat-value monthly">${fmtP0(s.monthly)}</div>
                    </div>
                    <div class="sav-stat">
                        <div class="sav-stat-label">Annual Rate</div>
                        <div class="sav-stat-value rate">${s.rate}%</div>
                    </div>
                    <div class="sav-stat">
                        <div class="sav-stat-label">Term</div>
                        <div class="sav-stat-value term">${s.term} yr${s.term !== 1 ? 's' : ''}</div>
                    </div>
                </div>
                <div class="sav-projection">
                    <div class="sav-proj-row">
                        <span class="sav-proj-label">Projected Value</span>
                        <span class="sav-proj-value total">${fmtP0(proj.futureValue)}</span>
                    </div>
                    <div class="sav-proj-row">
                        <span class="sav-proj-label">Total Contributions</span>
                        <span class="sav-proj-value contributions">${fmtP0(s.balance + proj.totalContributions)}</span>
                    </div>
                    <div class="sav-proj-row">
                        <span class="sav-proj-label">Interest Earned</span>
                        <span class="sav-proj-value interest">${fmtP0(proj.interestEarned)}</span>
                    </div>
                </div>
                <div class="sav-edit-row">
                    <span class="sav-edit-label">Bal</span>
                    <input type="number" class="sav-edit-input" value="${s.balance}" step="0.01"
                        onchange="updSavings(${s.id},'balance',this.value)" onfocus="this.select()">
                    <span class="sav-edit-label">Mth</span>
                    <input type="number" class="sav-edit-input" value="${s.monthly}" step="0.01"
                        onchange="updSavings(${s.id},'monthly',this.value)" onfocus="this.select()">
                    <span class="sav-edit-label">Rate%</span>
                    <input type="number" class="sav-edit-input" value="${s.rate}" step="0.01" style="width:60px;"
                        onchange="updSavings(${s.id},'rate',this.value)" onfocus="this.select()">
                    <span class="sav-edit-label">Yrs</span>
                    <input type="number" class="sav-edit-input" value="${s.term}" step="1" min="1" style="width:50px;"
                        onchange="updSavings(${s.id},'term',this.value)" onfocus="this.select()">
                </div>
            </div>`;
    }).join('');

    // Category chips
    document.getElementById('catChips').innerHTML = m.categories.map((c,i) => {
        const color = CAT_COLORS[i % CAT_COLORS.length];
        return `<span class="cat-chip"><span style="color:${color}">●</span> ${esc(c)} <button class="del" onclick="delCategory('${esc(c)}')">✕</button></span>`;
    }).join('');

    // Restore collapsed states
    Object.keys(collapsed).forEach(id => {
        const el = document.getElementById(id);
        if (el && collapsed[id]) el.classList.add('collapsed');
    });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Keyboard shortcuts for add rows
['incAmt','outAmt','savTerm','newCatName'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            if (id === 'incAmt') addIncome();
            else if (id === 'outAmt') addOutgoing();
            else if (id === 'savTerm') addSavings();
            else if (id === 'newCatName') addCategory();
        }
    });
});

// ════════════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════════════
function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
function closeSettings() {
    document.getElementById('settingsModal').classList.add('hidden');
    ['setCurPass','setNewPass','setConPass'].forEach(id => document.getElementById(id).value = '');
}

// Close modal on backdrop click
document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === document.getElementById('settingsModal')) closeSettings();
});

function changePassword() {
    const cur = document.getElementById('setCurPass').value;
    const np = document.getElementById('setNewPass').value;
    const cp = document.getElementById('setConPass').value;
    if (!cur || !np || !cp) { alert('Fill all fields'); return; }
    if (hashPw(cur) !== store.get(HASH_KEY)) { alert('Current password incorrect'); return; }
    if (np.length < 4) { alert('Min 4 characters'); return; }
    if (np !== cp) { alert('Passwords don\'t match'); return; }
    store.set(HASH_KEY, hashPw(np));
    alert('Password updated');
    closeSettings();
}

function exportData() {
    const blob = new Blob([JSON.stringify({ data, hash: store.get(HASH_KEY), v: '3.0', date: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `budget-${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(a.href);
}

function importData(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
        try {
            const imp = JSON.parse(ev.target.result);
            if (!imp.data) { alert('Invalid file'); return; }
            if (!confirm('Replace all data with import?')) { e.target.value = ''; return; }
            data = imp.data;
            if (imp.hash) store.set(HASH_KEY, imp.hash);
            save(); render();
            closeSettings();
            alert('Imported successfully');
        } catch(err) { alert('Error: ' + err.message); }
        e.target.value = '';
    };
    r.readAsText(f);
}

function clearAllData() {
    if (!confirm('Delete ALL budget data? This cannot be undone.')) return;
    if (!confirm('Are you absolutely sure?')) return;
    data = {};
    curMonth = getCurMonthKey();
    save(); render();
    closeSettings();
}

window.onerror = function(msg, url, line) {
    document.getElementById('lockError').textContent = 'JS Error: ' + msg + ' (line ' + line + ')';
};
try { initLock(); } catch(e) { document.getElementById('lockError').textContent = 'Init error: ' + e.message; }
